<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
</head>
<body style="overflow: hidden;">
<canvas id="myChart" style="width: 100vw;height: 100vh;"></canvas>
<script src="/plugins/jquery-3.6.3.min.js"></script>
<script src="/js/common.js"></script>
<script src="/plugins/chart.js"></script>
<script>

    /**
     * 曲线图X坐标长度1表示2秒
     */
    const DATA_COUNT = 30;

    /**
     * 上次计算时间
     */
    let preComputeTime = -1

    /**
     * 上一次入网流量总和
     */
    let preInDataTotal = -1

    /**
     * 上一次出网流量总和
     */
    let preOutDataTotal = -1

    /**
     * 入网网速
     */
    const mInSpeedData = initArray(DATA_COUNT, NaN)

    /**
     * 出网网速
     */
    const mOutSpeedData = initArray(DATA_COUNT, NaN)

    let chart = null

    $(() => {
        initChart()
        getData()
    });


    /**
     * 曲线图初始化
     */
    function initChart() {
        const data = {
            labels: initArray(DATA_COUNT, ""),
            datasets: [
                {
                    label: '入网网速',
                    data: initArray(DATA_COUNT, NaN),
                    borderColor: "#22ff00",
                    fill: false,
                    // cubicInterpolationMode: 'monotone',
                    tension: 0.4
                }, {
                    label: '出网网速',
                    data: initArray(DATA_COUNT, NaN),
                    borderColor: "#ff0000",
                    fill: false,
                    tension: 0.4
                }
            ]
        };

        const config = {
            type: 'line',
            data: data,
            options: {
                animation:false,//禁用动画
                // animation: {//禁用动画
                //     duration: 0
                // },
                responsive: true,
                maintainAspectRatio: false,//默认值true,要设置图标高度,必须设置为false
                plugins: {
                    // title: {
                    //     display: true,
                    //     text: '网速'
                    // },
                },
                interaction: {
                    intersect: false,
                },
                scales: {
                    x: {
                        display: true,
                        title: {
                            display: true
                        }
                    },
                    y: {
                        display: true,
                        title: {
                            display: true,
                            text: '网速(MB/S)'
                        },
                        suggestedMin: 0,
                        //suggestedMax: 200
                    }
                }
            },
        };
        const ctx = document.getElementById('myChart')
        chart = new Chart(ctx, config);
    }

    /**
     * 获取数据
     */
    function getData() {
        $.ajax({
            url: "/admin/chart?clientId=[[${param.clientId}]]",
            type: "POST"
        }).fail(() => {
            computeSpeed()
            setTimeout(getData, 2000)
        }).done((data) => {
            computeSpeed(data.inDataTotal, data.outDataTotal)
            setTimeout(getData, 2000)
        })
    }

    /**
     * 初始化一个数组
     * @param size
     * @param value
     */
    function initArray(size, value) {
        const array = []
        for (let i = 0; i < size; i++) {
            array.push(value)
        }
        return array
    }

    /**
     * 计算速度
     * @param inDataTotal
     * @param outDataTotal
     */
    function computeSpeed(inDataTotal, outDataTotal) {
        if (inDataTotal === undefined) {//获取数据失败的时候
            preComputeTime = -1
            mInSpeedData.push(NaN)
            mInSpeedData.splice(0, 1)
            mOutSpeedData.push(NaN)
            mOutSpeedData.splice(0, 1)

            //设置报表视图
            setChartData()
            return
        }

        //本次计算时间
        const currentTime = new Date().getTime()
        if (preComputeTime === -1) {
            preComputeTime = currentTime
            preInDataTotal = inDataTotal
            preOutDataTotal = outDataTotal
            return
        }

        //距离上次统计时间差
        const time = currentTime - preComputeTime

        //距上次统计入网流量差
        const cInData = inDataTotal - preInDataTotal

        //距上次统计出网流量差
        const cOutData = outDataTotal - preOutDataTotal

        //以兆为单位
        const inSpeed = cInData / time * 1000
        mInSpeedData.push(inSpeed)
        mInSpeedData.splice(0, 1)

        //以兆为单位
        const outSpeed = cOutData / time * 1000
        mOutSpeedData.push(outSpeed)
        mOutSpeedData.splice(0, 1)

        preComputeTime = currentTime
        preInDataTotal = inDataTotal
        preOutDataTotal = outDataTotal

        //设置报表视图
        setChartData()
    }

    /**
     * 设置报表数据
     */
    function setChartData(){
        let maxSpeed = 0
        mInSpeedData.forEach((it)=>{
            if(isNaN(it)) return
            maxSpeed = Math.max(maxSpeed,it)
        })
        mOutSpeedData.forEach((it)=>{
            if(isNaN(it)) return
            maxSpeed = Math.max(maxSpeed,it)
        })

        //倍率
        let rate = 1
        if(maxSpeed >= 1024 * 1024){
            rate = 1024 * 1024
            chart.options.scales.y.title.text = "MB/S"
        }else if(maxSpeed >= 1024){
            rate = 1024
            chart.options.scales.y.title.text = "KB/S"
        }else{
            chart.options.scales.y.title.text = "B/S"
        }

        //入网网速
        const inSpeedData = mInSpeedData.map((it)=>{
            if(isNaN(it)){
                return NaN
            }else{
                return (it / rate).toFixed(2)
            }
        })

        //出网网速
        const outSpeedData = mOutSpeedData.map((it)=>{
            if(isNaN(it)){
                return NaN
            }else{
                return (it / rate).toFixed(2)
            }
        })
        chart.data.datasets[0].data = inSpeedData //入网网速
        chart.data.datasets[1].data = outSpeedData //出网网速

        chart.update();
    }
</script>
</body>
</html>
