<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    {{template "head" .}}
    <title>客户端</title>
</head>
<body>
{{template "top-bar" .}}
<div class="mx-0 mt-3">
    <div id="list" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-0">
    </div>
</div>
<th:block th:include="admin/include/js :: js"/>
<script>
    $(function(){
        addNavBtn("添加", () => {
            window.location.href = "/client_list/client_edit"
        });
        init()
    });

    function init() {
        $.ajaxByData("/client_list/init").success(data => {
            fillData(data)
        }).post()
    }

    /**
     * 填充数据
     */
    function fillData(data){
        const $list = $("#list")
        data.forEach(item=>{
            $list.append(`
              <div class="col px-0 pb-3 px-3">
                <div class="bg-white rounded p-2 position-relative">
                    <div style="position: absolute;top:0;right:8px;font-size: 40px;color: #0000001c;">

                        <!--在线状态-->
                        <i th:if="${item.onlineState}" class="bi bi-wifi text-success opacity-50"></i>
                        <i th:if="${!item.onlineState}" class="bi bi-wifi-off text-danger opacity-50"></i>
                    </div>
                    <div class="text-center fs-5"><span>${item.Name}</span></div>
                    <div>版本:<span>${item.Version}</span></div>
                    <div>秘钥:<span>${item.Key}</span></div>
                    <div>IP:<span>${item.Ip}</span></div>
                    <div>入出流量:<span>${item.InDataTotal}</span>/<span>${item.OutDataTotal}</span>
                    </div>
                    <div class="text-end">
                        <button class="btn btn-sm btn-outline-danger" onclick="onSetStateClick(${item.Id})">
                            <i th:if="${item.enableState == 1}" class="bi bi-pause-fill"></i>
                            <i th:if="${item.enableState == 0}" class="bi bi-play-fill"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="onDeleteClick(${item.Id})">
                            <i class="bi bi-trash3"></i>
                        </button>
                        <a class="btn btn-sm btn-outline-primary"
                          href="/client_list/client_edit?id=${item.Id}"><i
                                class="bi bi-pencil-square"></i></a>
                        <a class="btn btn-sm btn-outline-primary"
                           href="/channel_list?clientId=${item.Id}">隧道</a>
                    </div>
                </div>
              </div>`
            )
        })

    }

    /**
     * 删除按钮点击事件
     * @param id
     */
    function onDeleteClick(id) {
        const result = confirm("确定删除?")
        if (result) {
            $.ajax({
                url: "/admin/client_list/delete?id=" + id,
                type: "POST"
            }).fail($ajaxFail).done(() => {
                history.go(0)
            })
        }
    }

    /**
     * 修改可用状态
     * @param id
     */
    function onSetStateClick(id) {
        $.ajax({
            url: "/admin/client_list/set_state?id=" + id,
            type: "POST"
        }).fail($ajaxFail).done(() => {
            history.go(0)
        })
    }
</script>
</body>
</html>
